name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  syntax-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install zsh
        run: sudo apt-get update && sudo apt-get install -y zsh

      - name: Check zsh syntax
        run: zsh -n pkgs_core.zsh

      - name: Check install script syntax
        run: zsh -n install.sh

  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install shellcheck
        run: sudo apt-get update && sudo apt-get install -y shellcheck

      - name: Lint install script
        run: shellcheck -s bash install.sh || true

      - name: Lint main script (zsh-specific, advisory)
        run: shellcheck -s bash -e SC2039,SC2046,SC2086,SC2154,SC2164 pkgs_core.zsh || true
